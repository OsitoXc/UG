<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>United Glory | Join</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2756062357855550"
     crossorigin="anonymous"></script>

<link rel="icon" type="image/png" href="../GLORY - B.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/global.css">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img src="../assets/img/animation.gif" alt="Loading animation">
</div>

<!-- NAVBAmaR -->
<div class="navbar">
  <div class="navbar-inner">
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <div class="site-name">UNITED GLORY</div>
  </div>

  <div id="menu" class="dropdown-menu">
    <a href="/">HOME</a>
    <a href="/news">NEWS</a>
  </div>
</div>

<section class="join-banner">

  <img src="/assets/img/banners/join.png" alt="Join United Glory">

  <div class="banner-text">
    <h1>ÚNETE A UNITED GLORY</h1>
    <p>Selecciona una opción para enviar tu solicitud</p>
  </div>

</section>


<section class="join-container">

<div class="select-box">

<h2>Selecciona una opción</h2>

<select id="typeSelect">

<option value="">Seleccionar...</option>
<option value="clan">Clan</option>
<option value="esport">eSport</option>
<option value="staff">Staff</option>

</select>

</div>


<!-- CLAN -->

<div id="clanForm" class="form-box">

<h3>Solicitud Clan</h3>

<input type="text" placeholder="Nombre">

<input type="text" placeholder="ID del juego">

<input type="text" placeholder="Número">

<button>Enviar solicitud</button>

</div>


<!-- ESPORT -->

<div id="esportForm" class="form-box">

<h3>Solicitud eSports</h3>

<input type="text" placeholder="Nombre">

<input type="text" placeholder="Juego">

<input type="text" placeholder="ID del juego">

<input type="number" placeholder="Edad">

<button>Enviar solicitud</button>

</div>


<!-- STAFF -->

<div id="staffForm" class="form-box">

<h3>Solicitud Staff</h3>

<input type="text" placeholder="Nombre">

<input type="number" placeholder="Edad">

<textarea placeholder="Experiencia"></textarea>

<button>Enviar solicitud</button>

</div>

</section>
