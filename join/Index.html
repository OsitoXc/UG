<section class="join-banner">

  <img src="/assets/img/banners/join.png" alt="Join United Glory">

  <div class="banner-text">
    <h1>ÚNETE A UNITED GLORY</h1>
    <p>Selecciona una opción para enviar tu solicitud</p>
  </div>

</section>


<section class="join-container">

<div class="select-box">

<h2>Selecciona una opción</h2>

<select id="typeSelect">

<option value="">Seleccionar...</option>
<option value="clan">Clan</option>
<option value="esport">eSport</option>
<option value="staff">Staff</option>

</select>

</div>


<!-- CLAN -->

<div id="clanForm" class="form-box">

<h3>Solicitud Clan</h3>

<input type="text" placeholder="Nombre">

<input type="text" placeholder="ID del juego">

<input type="text" placeholder="Número">

<button>Enviar solicitud</button>

</div>


<!-- ESPORT -->

<div id="esportForm" class="form-box">

<h3>Solicitud eSports</h3>

<input type="text" placeholder="Nombre">

<input type="text" placeholder="Juego">

<input type="text" placeholder="ID del juego">

<input type="number" placeholder="Edad">

<button>Enviar solicitud</button>

</div>


<!-- STAFF -->

<div id="staffForm" class="form-box">

<h3>Solicitud Staff</h3>

<input type="text" placeholder="Nombre">

<input type="number" placeholder="Edad">

<textarea placeholder="Experiencia"></textarea>

<button>Enviar solicitud</button>

</div>

</section>
