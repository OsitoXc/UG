<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>United Glory | Join</title>

<link rel="icon" type="image/png" href="../GLORY - B.png">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/global.css">

</head>

<body>

<!-- POPUP -->

<div id="popupMessage" class="popup">
<div class="popup-box">
<p id="popupText"></p>
<button onclick="closePopup()">Aceptar</button>
</div>
</div>


<!-- LOADER -->

<div id="loader">
<img src="../assets/img/animation.gif">
</div>


<div class="navbar">

<div class="navbar-inner">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="site-name">UNITED GLORY</div>

<div id="userBox" class="user-menu"></div>

</div>

<div id="menu" class="dropdown-menu">
<a href="/">HOME</a>
<a href="/join">JOIN</a>
<a href="/news">NEWS</a>
</div>

</div>


<main class="container">


<section class="team-banner join-banner">

<div class="banner-overlay"></div>

<div class="banner-content">
<h1>ÚNETE A UNITED GLORY</h1>
<p>Selecciona una opción para enviar tu solicitud</p>
</div>

</section>



<section class="join-box">

<h2>Selecciona una opción</h2>

<select id="typeSelect">

<option value="">Seleccionar...</option>
<option value="clan">Clan</option>
<option value="esport">Esport</option>

</select>

</section>



<section id="clanForm" class="form-box">

<h3>Solicitud Clan</h3>

<input class="auto-name" placeholder="Nombre">
<input id="clanID" placeholder="ID">
<input id="clanNumero" placeholder="Número">
<input class="auto-discord" placeholder="Discord">

<button onclick="sendClan()">Enviar solicitud</button>

</section>



<section id="esportForm" class="form-box">

<h3>Solicitud Esport</h3>

<input class="auto-name" placeholder="Nombre">
<input id="edad" placeholder="Edad">
<input id="pais" placeholder="País">
<input id="gameID" placeholder="ID">
<input id="numero" placeholder="Número">

<select id="rol">
<option value="">Rol</option>
<option>Rusher L1</option>
<option>Rusher L2</option>
<option>Granadero/IGL</option>
<option>Soporte</option>
</select>

<input id="disponibilidad" placeholder="Disponibilidad">

<textarea id="exp" placeholder="Experiencia"></textarea>

<button onclick="sendEsport()">Enviar solicitud</button>

</section>


</main>


<footer class="footer-card">
©2025 United Glory | All rights reserved.
</footer>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script src="/assets/js/auth.js"></script>

<script src="../assets/js/navbar.js"></script>
<script src="../assets/js/monitor.js"></script>
<script src="../assets/js/join.js"></script>


<script>

document.addEventListener("DOMContentLoaded",function(){

const select = document.getElementById("typeSelect");

const clanForm = document.getElementById("clanForm");
const esportForm = document.getElementById("esportForm");

clanForm.style.display="none";
esportForm.style.display="none";

select.addEventListener("change",function(){

clanForm.style.display="none";
esportForm.style.display="none";

if(this.value==="clan"){

clanForm.style.display="block";

}

if(this.value==="esport"){

esportForm.style.display="block";

}

});

});

</script>


</body>
</html>
