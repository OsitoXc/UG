<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>United Glory | Join</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2756062357855550"
crossorigin="anonymous"></script>

<link rel="icon" type="image/png" href="../GLORY - B.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/global.css">
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="/assets/js/auth.js"></script>

<body>

<!-- LOADER -->
<div id="loader">
<img src="../assets/img/animation.gif" alt="Loading animation">
</div>

<!-- NAVBAR -->
<div class="navbar-inner">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="site-name">UNITED GLORY</div>

<div id="userBox"></div>

</div>

<main class="container">

<!-- BANNER -->
<section class="team-banner join-banner">

<div class="banner-overlay"></div>

<div class="banner-content">
<h1>ÚNETE A UNITED GLORY</h1>
<p>Selecciona una opción para enviar tu solicitud</p>
</div>

</section>

<!-- SELECTOR -->

<section class="join-box">

<h2>Selecciona una opción</h2>

<select id="typeSelect">

<option value="">Seleccionar...</option>
<option value="clan">Clan</option>
<option value="esport">eSport</option>
<option value="staff">Staff</option>

</select>

</section>


<!-- FORMULARIO CLAN -->

<section id="clanForm" class="form-box">

<h3>Solicitud Clan</h3>

<input type="text" placeholder="Nombre">
<input type="text" placeholder="ID del juego">
<input type="text" placeholder="Número">

<button>Enviar solicitud</button>

</section>


<!-- FORMULARIO ESPORT -->

<section id="esportForm" class="form-box">

<h3>Solicitud eSports</h3>

<input type="text" placeholder="Nombre">
<input type="text" placeholder="Juego">
<input type="text" placeholder="ID del juego">
<input type="number" placeholder="Edad">

<button>Enviar solicitud</button>

</section>


<!-- FORMULARIO STAFF -->

<section id="staffForm" class="form-box">

<h3>Solicitud Staff</h3>

<input type="text" placeholder="Nombre">
<input type="number" placeholder="Edad">
<textarea placeholder="Experiencia"></textarea>

<button>Enviar solicitud</button>

</section>

</main>

<footer class="footer-card">
©2025 United Glory | All rights reserved.
</footer>

<script src="../assets/js/navbar.js"></script>
<script src="../assets/js/monitor.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

const select = document.getElementById("typeSelect");

const clanForm = document.getElementById("clanForm");
const esportForm = document.getElementById("esportForm");
const staffForm = document.getElementById("staffForm");

select.addEventListener("change", function(){

clanForm.style.display="none";
esportForm.style.display="none";
staffForm.style.display="none";

if(this.value === "clan"){
clanForm.style.display="block";
}

if(this.value === "esport"){
esportForm.style.display="block";
}

if(this.value === "staff"){
staffForm.style.display="block";
}

});

});

</script>

</body>
</html>
